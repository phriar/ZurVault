<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frame</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --ink:   #0a0a0a;
  --gold:  #c9a84c;
  --dim:   rgba(255,255,255,0.18);
  --faint: rgba(255,255,255,0.07);
}

html, body {
  width: 100%; height: 100%;
  background: var(--ink);
  overflow: hidden;
  cursor: none;
}

/* ── COLLECTION PICKER ── */
#picker {
  position: fixed; inset: 0;
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 0; z-index: 100;
  background: var(--ink);
  padding: 40px 24px;
}
#picker.show { display: flex; }

.p-label {
  font-family: 'DM Mono', monospace;
  font-size: .55rem; letter-spacing: .4em;
  color: rgba(255,255,255,0.18);
  text-transform: uppercase;
  margin-bottom: 32px;
}

.p-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 8px;
  width: 100%; max-width: 820px;
  max-height: 70vh;
  overflow-y: auto;
  padding: 2px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.08) transparent;
}

.p-card {
  position: relative;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 4px;
  overflow: hidden;
  cursor: pointer;
  background: #111;
  aspect-ratio: 1/1;
  transition: border-color .18s, transform .18s;
}
.p-card:hover {
  border-color: var(--gold);
  transform: translateY(-2px);
}
.p-card img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  opacity: 0.7;
  transition: opacity .2s;
}
.p-card:hover img { opacity: 1; }
.p-card-foot {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 22px 8px 8px;
  background: linear-gradient(transparent, rgba(0,0,0,0.9));
}
.p-card-name {
  font-family: 'DM Mono', monospace;
  font-size: .52rem; letter-spacing: .1em;
  color: rgba(255,255,255,0.8);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.p-card-count {
  font-family: 'DM Mono', monospace;
  font-size: .44rem; letter-spacing: .1em;
  color: rgba(255,255,255,0.3);
  margin-top: 1px;
}
.p-card-all {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 6px;
  border: 1px dashed rgba(255,255,255,0.1);
}
.p-card-all:hover { border-color: rgba(201,168,76,0.4); }
.p-all-icon {
  font-size: 1.4rem; opacity: 0.3;
}
.p-all-label {
  font-family: 'DM Mono', monospace;
  font-size: .52rem; letter-spacing: .15em;
  color: rgba(255,255,255,0.3);
  text-transform: uppercase;
}
.p-card-skel {
  position: absolute; inset: 0;
  background: linear-gradient(120deg, #111 25%, #191919 50%, #111 75%);
  background-size: 300%;
  animation: shim 1.4s ease infinite;
}
@keyframes shim { 0%{background-position:300% 0} 100%{background-position:-300% 0} }

.p-back {
  margin-top: 20px;
  font-family: 'DM Mono', monospace;
  font-size: .5rem; letter-spacing: .2em;
  color: rgba(255,255,255,0.15);
  cursor: pointer; text-transform: uppercase;
  background: none; border: none;
  transition: color .15s;
}
.p-back:hover { color: rgba(255,255,255,0.4); }

/* ── CONNECT SCREEN ── */
#connect {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 28px; z-index: 100;
  background: var(--ink);
}
#connect.hide { display: none; }

.c-wordmark {
  font-family: 'DM Mono', monospace;
  font-size: .65rem; letter-spacing: .4em;
  color: rgba(255,255,255,0.2);
  text-transform: uppercase;
}

.c-btn {
  background: none;
  border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.5);
  font-family: 'DM Mono', monospace;
  font-size: .62rem; letter-spacing: .25em;
  padding: 12px 28px; border-radius: 2px;
  cursor: pointer; text-transform: uppercase;
  transition: border-color .2s, color .2s;
}
.c-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
}

.c-note {
  font-family: 'DM Mono', monospace;
  font-size: .52rem; letter-spacing: .15em;
  color: rgba(255,255,255,0.12);
}
.c-note a { color: rgba(201,168,76,0.5); text-decoration: none; }

/* ── FRAME ── */
#frame {
  position: fixed; inset: 0;
  display: none;
}
#frame.show { display: block; }

/* Full-bleed blurred background */
#bg {
  position: absolute; inset: -40px;
  background-size: cover;
  background-position: center;
  filter: blur(60px) brightness(0.25) saturate(1.6);
  transition: background-image 1.2s ease;
  z-index: 0;
}

/* Art image — centered, contained */
#art-wrap {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 1;
  padding: 48px 48px 110px; /* leave room at bottom for meta */
}
#art {
  max-width: 100%; max-height: 100%;
  object-fit: contain;
  box-shadow: 0 32px 80px rgba(0,0,0,0.7);
  transition: opacity .7s ease;
  display: block;
}
#art.fade { opacity: 0; }

/* ── METADATA — bottom left ── */
#meta {
  position: absolute;
  bottom: 0; left: 0;
  width: 100%;
  z-index: 2;
  padding: 60px 36px 28px;
  background: linear-gradient(transparent, rgba(0,0,0,0.72) 40%, rgba(0,0,0,0.88));
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 24px;
  transition: opacity .5s ease;
}
#meta.hide { opacity: 0; }

.meta-left { min-width: 0; }

.meta-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.4rem, 3vw, 2.2rem);
  font-weight: 300;
  color: #fff;
  letter-spacing: .02em;
  line-height: 1.1;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 70vw;
}

.meta-coll {
  font-family: 'DM Mono', monospace;
  font-size: .58rem; letter-spacing: .22em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 14px;
}

.meta-traits {
  display: flex; gap: 10px; flex-wrap: wrap;
}

.trait {
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 2px;
  padding: 4px 10px;
  backdrop-filter: blur(4px);
  background: rgba(255,255,255,0.04);
}
.trait-type {
  font-family: 'DM Mono', monospace;
  font-size: .42rem; letter-spacing: .18em;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
  margin-bottom: 1px;
}
.trait-val {
  font-family: 'Cormorant Garamond', serif;
  font-size: .82rem; font-weight: 400;
  color: rgba(255,255,255,0.8);
}

.meta-right {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 10px;
}

.me-link {
  font-family: 'DM Mono', monospace;
  font-size: .52rem; letter-spacing: .2em;
  color: rgba(201,168,76,0.6);
  text-decoration: none;
  text-transform: uppercase;
  border: 1px solid rgba(201,168,76,0.2);
  padding: 6px 14px; border-radius: 2px;
  transition: color .2s, border-color .2s;
  cursor: pointer;
  white-space: nowrap;
}
.me-link:hover {
  color: var(--gold);
  border-color: rgba(201,168,76,0.5);
}

/* Counter + progress */
.meta-counter {
  font-family: 'DM Mono', monospace;
  font-size: .48rem; letter-spacing: .2em;
  color: rgba(255,255,255,0.18);
}

/* Progress bar */
#progress {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: rgba(255,255,255,0.06);
  z-index: 3;
}
#progress-fill {
  height: 100%;
  background: var(--gold);
  width: 0%;
  transition: width linear;
  opacity: 0.5;
}

/* ── CONTROLS (appear on hover) ── */
#controls {
  position: absolute;
  top: 20px; right: 20px;
  z-index: 10;
  display: flex; gap: 8px;
  opacity: 0;
  transition: opacity .3s;
}
body:hover #controls { opacity: 1; }
body:hover { cursor: default; }

.ctrl-btn {
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.4);
  font-family: 'DM Mono', monospace;
  font-size: .52rem; letter-spacing: .12em;
  padding: 6px 12px; border-radius: 2px;
  cursor: pointer; text-transform: uppercase;
  transition: all .15s;
  backdrop-filter: blur(8px);
}
.ctrl-btn:hover { border-color: var(--gold); color: var(--gold); }

/* Grain overlay */
#grain {
  position: fixed; inset: 0; z-index: 20;
  pointer-events: none; opacity: 0.028;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* Loading state */
#loading {
  position: fixed; inset: 0; z-index: 50;
  display: none; align-items: center; justify-content: center;
  background: var(--ink);
}
#loading.show { display: flex; }
.load-ring {
  width: 28px; height: 28px;
  border: 1px solid rgba(255,255,255,0.08);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin .9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="grain"></div>

<!-- COLLECTION PICKER -->
<div id="picker">
  <div class="p-label">Choose a collection</div>
  <div class="p-grid" id="p-grid"></div>
  <button class="p-back" onclick="backToConnect()">← Disconnect</button>
</div>

<!-- CONNECT -->
<div id="connect">
  <div class="c-wordmark">NFT Frame</div>
  <button class="c-btn" onclick="connectWallet()">Connect Phantom</button>
  <div class="c-note" id="no-ph" style="display:none">
    Phantom not found — <a href="https://phantom.app" target="_blank">install it</a>
  </div>
</div>

<!-- LOADING -->
<div id="loading"><div class="load-ring"></div></div>

<!-- FRAME -->
<div id="frame">
  <div id="bg"></div>
  <div id="art-wrap">
    <img id="art" src="" alt="" />
  </div>
  <div id="meta">
    <div class="meta-left">
      <div class="meta-name" id="m-name"></div>
      <div class="meta-coll" id="m-coll"></div>
      <div class="meta-traits" id="m-traits"></div>
    </div>
    <div class="meta-right">
      <a class="me-link" id="m-melink" href="#" target="_blank" rel="noopener">View on Magic Eden ↗</a>
      <div class="meta-counter" id="m-counter"></div>
    </div>
  </div>
  <div id="progress"><div id="progress-fill"></div></div>
  <div id="controls">
    <button class="ctrl-btn" id="pause-btn" onclick="togglePause()">Pause</button>
    <button class="ctrl-btn" onclick="prevNFT()">&#8592;</button>
    <button class="ctrl-btn" onclick="nextNFT()">&#8594;</button>
    <button class="ctrl-btn" onclick="disconnect()" style="opacity:.4">Disconnect</button>
  </div>
</div>

<script>
var HELIUS_KEY = 'YOUR_HELIUS_KEY';
var INTERVAL   = 8000;
var MAX_TRAITS = 4;

var wallet   = null;
var allNFTs  = [];   // every NFT from wallet
var nfts     = [];   // active filtered set
var idx      = 0;
var paused   = false;
var timer    = null;

var connectEl = document.getElementById('connect');
var pickerEl  = document.getElementById('picker');
var frameEl   = document.getElementById('frame');
var loadingEl = document.getElementById('loading');
var bgEl      = document.getElementById('bg');
var artEl     = document.getElementById('art');
var mName     = document.getElementById('m-name');
var mColl     = document.getElementById('m-coll');
var mTraits   = document.getElementById('m-traits');
var mMeLink   = document.getElementById('m-melink');
var mCounter  = document.getElementById('m-counter');
var progFill  = document.getElementById('progress-fill');
var pauseBtn  = document.getElementById('pause-btn');
var RPC       = 'https://mainnet.helius-rpc.com/?api-key=' + HELIUS_KEY;

// ── WALLET ───────────────────────────────────────────
async function connectWallet() {
  var ph = window.solana;
  if (!ph || !ph.isPhantom) { document.getElementById('no-ph').style.display = 'block'; return; }
  try {
    var r = await ph.connect();
    wallet = r.publicKey.toString();
    connectEl.classList.add('hide');
    loadingEl.classList.add('show');
    await fetchAllNFTs();
  } catch(e) { console.error(e); }
}

function backToConnect() {
  pickerEl.classList.remove('show');
  connectEl.classList.remove('hide');
}

function disconnect() {
  wallet = null; allNFTs = []; nfts = [];
  clearTimeout(timer);
  frameEl.classList.remove('show');
  pickerEl.classList.remove('show');
  connectEl.classList.remove('hide');
}

window.addEventListener('load', async function() {
  var ph = window.solana;
  if (ph && ph.isPhantom) {
    try {
      var r = await ph.connect({ onlyIfTrusted: true });
      wallet = r.publicKey.toString();
      connectEl.classList.add('hide');
      loadingEl.classList.add('show');
      await fetchAllNFTs();
    } catch(e) {}
  }
});

// ── FETCH ALL NFTs ────────────────────────────────────
async function fetchAllNFTs() {
  allNFTs = [];
  try {
    var page = 1;
    while (true) {
      var result = await rpc('getAssetsByOwner', {
        ownerAddress: wallet, page: page, limit: 1000,
        displayOptions: {
          showUnverifiedCollections: true,
          showCollectionMetadata: true,
          showNativeBalance: false
        }
      });
      var items = (result && result.items) || [];
      for (var i = 0; i < items.length; i++) {
        var a = items[i];
        // Accept all NFT-like interfaces
        if (['V1_NFT','ProgrammableNFT','V1_PRINT','MplCoreAsset','Custom'].indexOf(a.interface) >= 0
            || (a.interface && a.interface.toLowerCase().includes('nft'))) {
          var n = parse(a);
          if (n.image) allNFTs.push(n);
        }
      }
      if (items.length < 1000 || ++page > 10) break;
    }
    loadingEl.classList.remove('show');
    showPicker();
  } catch(e) {
    console.error(e);
    loadingEl.classList.remove('show');
    connectEl.classList.remove('hide');
  }
}

function parse(a) {
  var meta    = (a.content && a.content.metadata) || {};
  var links   = (a.content && a.content.links)    || {};
  var files   = (a.content && a.content.files)    || [];
  var grp     = (a.grouping || []).find(function(g){ return g.group_key === 'collection'; });

  // Image: try multiple sources in priority order
  var image = links.image || links.animation_url || '';
  if (!image) {
    // Walk files: prefer image mime, then cdn_uri, then uri
    for (var i = 0; i < files.length; i++) {
      var f = files[i];
      var uri = f.cdn_uri || f.uri || '';
      if (!uri) continue;
      if (f.mime && f.mime.startsWith('image/')) { image = uri; break; }
      if (!image && uri.match(/\.(png|jpg|jpeg|gif|webp|svg)/i)) image = uri;
      if (!image) image = uri; // last resort: take first file with any uri
    }
  }
  // Also try json_uri as absolute last resort (arweave json often has image inside)
  var jsonUri = (a.content && a.content.json_uri) || '';

  var collName = (grp && grp.collection_metadata && grp.collection_metadata.name)
    || (meta.collection && meta.collection.name)
    || meta.symbol || '';

  return {
    mint:       a.id,
    name:       meta.name || a.id.slice(0,8),
    collection: collName,
    image:      image,
    jsonUri:    jsonUri,
    attributes: meta.attributes || [],
  };
}

// ── COLLECTION PICKER ─────────────────────────────────
function showPicker() {
  // Build collection map: name → { nfts:[], thumb }
  var collMap = {};
  for (var i = 0; i < allNFTs.length; i++) {
    var n = allNFTs[i];
    var key = n.collection || '(No Collection)';
    if (!collMap[key]) collMap[key] = { name: key, items: [], thumb: n.image };
    collMap[key].items.push(n);
  }

  // Sort by count desc
  var colls = Object.values(collMap).sort(function(a,b){ return b.items.length - a.items.length; });

  var grid = document.getElementById('p-grid');
  grid.innerHTML = '';

  // "All NFTs" card first
  var allCard = document.createElement('div');
  allCard.className = 'p-card p-card-all';
  allCard.innerHTML = '<div class="p-all-icon">⬡</div>'
    + '<div class="p-all-label">All NFTs</div>'
    + '<div class="p-card-count" style="color:rgba(255,255,255,0.25);font-size:.44rem;font-family:DM Mono,monospace;letter-spacing:.1em;margin-top:2px">'
    + allNFTs.length + ' items</div>';
  allCard.onclick = function() { startFrame(allNFTs); };
  grid.appendChild(allCard);

  // One card per collection
  colls.forEach(function(c) {
    var card = document.createElement('div');
    card.className = 'p-card';
    card.innerHTML = '<div class="p-card-skel"></div>'
      + '<img src="' + esc(c.thumb) + '" alt="" onload="this.previousElementSibling.remove()" onerror="this.previousElementSibling.remove()">'
      + '<div class="p-card-foot">'
      + '<div class="p-card-name">' + esc(c.name) + '</div>'
      + '<div class="p-card-count">' + c.items.length + ' NFT' + (c.items.length !== 1 ? 's' : '') + '</div>'
      + '</div>';
    card.onclick = (function(items){ return function(){ startFrame(items); }; })(c.items);
    grid.appendChild(card);
  });

  pickerEl.classList.add('show');
}

// ── START FRAME WITH CHOSEN SET ───────────────────────
function startFrame(items) {
  nfts = shuffle(items.slice()); // copy + shuffle
  idx = 0;
  pickerEl.classList.remove('show');
  frameEl.classList.add('show');
  show(idx);
  schedule();
}

// ── DISPLAY ──────────────────────────────────────────
function show(i) {
  var n = nfts[i];
  if (!n) return;

  artEl.classList.add('fade');
  setTimeout(function() {
    artEl.src = n.image;
    artEl.onload  = function() { artEl.classList.remove('fade'); };
    artEl.onerror = function() { artEl.classList.remove('fade'); };
  }, 350);

  bgEl.style.backgroundImage = 'url(' + n.image + ')';
  mName.textContent = n.name;
  mColl.textContent = n.collection;

  var attrs = (n.attributes || []).slice(0, MAX_TRAITS);
  mTraits.innerHTML = attrs.map(function(a) {
    return '<div class="trait">'
      + '<div class="trait-type">' + esc(String(a.trait_type || '')) + '</div>'
      + '<div class="trait-val">'  + esc(String(a.value      || '—')) + '</div>'
      + '</div>';
  }).join('');

  mMeLink.href = 'https://magiceden.io/item-details/' + n.mint;
  mCounter.textContent = (i + 1) + ' / ' + nfts.length;
  if (nfts[i + 1]) { var pre = new Image(); pre.src = nfts[i + 1].image; }
}

function nextNFT() { idx = (idx+1)%nfts.length; show(idx); if(!paused){clearTimeout(timer);schedule();} }
function prevNFT() { idx = (idx-1+nfts.length)%nfts.length; show(idx); if(!paused){clearTimeout(timer);schedule();} }

function schedule() {
  clearTimeout(timer);
  progFill.style.transition = 'none'; progFill.style.width = '0%';
  void progFill.offsetWidth;
  progFill.style.transition = 'width ' + INTERVAL + 'ms linear';
  progFill.style.width = '100%';
  timer = setTimeout(function(){ idx=(idx+1)%nfts.length; show(idx); schedule(); }, INTERVAL);
}

function togglePause() {
  paused = !paused;
  pauseBtn.textContent = paused ? 'Play' : 'Pause';
  if (paused) { clearTimeout(timer); progFill.style.transition = 'none'; }
  else schedule();
}

// Change collection — go back to picker without disconnecting
document.getElementById('controls').insertAdjacentHTML('afterbegin',
  '<button class="ctrl-btn" onclick="switchCollection()" style="margin-right:4px">Collections</button>'
);
function switchCollection() {
  clearTimeout(timer);
  frameEl.classList.remove('show');
  showPicker();
}

document.getElementById('frame').addEventListener('click', function(e) {
  if (e.target.closest('#controls') || e.target.closest('.me-link')) return;
  togglePause();
});
document.addEventListener('keydown', function(e) {
  if (e.key==='ArrowRight') nextNFT();
  if (e.key==='ArrowLeft')  prevNFT();
  if (e.key===' ') { e.preventDefault(); togglePause(); }
});

async function rpc(method, params) {
  var r = await fetch(RPC, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ jsonrpc:'2.0', id:1, method:method, params:params })
  });
  var j = await r.json();
  return j.result;
}
function shuffle(arr) {
  for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;}
  return arr;
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
