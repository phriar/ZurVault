<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frame</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --ink:   #0a0a0a;
  --gold:  #c9a84c;
  --dim:   rgba(255,255,255,0.18);
  --faint: rgba(255,255,255,0.07);
}

html, body {
  width: 100%; height: 100%;
  background: var(--ink);
  overflow: hidden;
  cursor: none;
}

/* ── CONNECT SCREEN ── */
#connect {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 28px; z-index: 100;
  background: var(--ink);
}
#connect.hide { display: none; }

.c-wordmark {
  font-family: 'DM Mono', monospace;
  font-size: .65rem; letter-spacing: .4em;
  color: rgba(255,255,255,0.2);
  text-transform: uppercase;
}

.c-btn {
  background: none;
  border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.5);
  font-family: 'DM Mono', monospace;
  font-size: .62rem; letter-spacing: .25em;
  padding: 12px 28px; border-radius: 2px;
  cursor: pointer; text-transform: uppercase;
  transition: border-color .2s, color .2s;
}
.c-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
}

.c-note {
  font-family: 'DM Mono', monospace;
  font-size: .52rem; letter-spacing: .15em;
  color: rgba(255,255,255,0.12);
}
.c-note a { color: rgba(201,168,76,0.5); text-decoration: none; }

/* ── FRAME ── */
#frame {
  position: fixed; inset: 0;
  display: none;
}
#frame.show { display: block; }

/* Full-bleed blurred background */
#bg {
  position: absolute; inset: -40px;
  background-size: cover;
  background-position: center;
  filter: blur(60px) brightness(0.25) saturate(1.6);
  transition: background-image 1.2s ease;
  z-index: 0;
}

/* Art image — centered, contained */
#art-wrap {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 1;
  padding: 48px 48px 110px; /* leave room at bottom for meta */
}
#art {
  max-width: 100%; max-height: 100%;
  object-fit: contain;
  box-shadow: 0 32px 80px rgba(0,0,0,0.7);
  transition: opacity .7s ease;
  display: block;
}
#art.fade { opacity: 0; }

/* ── METADATA — bottom left ── */
#meta {
  position: absolute;
  bottom: 0; left: 0;
  width: 100%;
  z-index: 2;
  padding: 60px 36px 28px;
  background: linear-gradient(transparent, rgba(0,0,0,0.72) 40%, rgba(0,0,0,0.88));
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 24px;
  transition: opacity .5s ease;
}
#meta.hide { opacity: 0; }

.meta-left { min-width: 0; }

.meta-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.4rem, 3vw, 2.2rem);
  font-weight: 300;
  color: #fff;
  letter-spacing: .02em;
  line-height: 1.1;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 70vw;
}

.meta-coll {
  font-family: 'DM Mono', monospace;
  font-size: .58rem; letter-spacing: .22em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 14px;
}

.meta-traits {
  display: flex; gap: 10px; flex-wrap: wrap;
}

.trait {
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 2px;
  padding: 4px 10px;
  backdrop-filter: blur(4px);
  background: rgba(255,255,255,0.04);
}
.trait-type {
  font-family: 'DM Mono', monospace;
  font-size: .42rem; letter-spacing: .18em;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
  margin-bottom: 1px;
}
.trait-val {
  font-family: 'Cormorant Garamond', serif;
  font-size: .82rem; font-weight: 400;
  color: rgba(255,255,255,0.8);
}

.meta-right {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 10px;
}

.me-link {
  font-family: 'DM Mono', monospace;
  font-size: .52rem; letter-spacing: .2em;
  color: rgba(201,168,76,0.6);
  text-decoration: none;
  text-transform: uppercase;
  border: 1px solid rgba(201,168,76,0.2);
  padding: 6px 14px; border-radius: 2px;
  transition: color .2s, border-color .2s;
  cursor: pointer;
  white-space: nowrap;
}
.me-link:hover {
  color: var(--gold);
  border-color: rgba(201,168,76,0.5);
}

/* Counter + progress */
.meta-counter {
  font-family: 'DM Mono', monospace;
  font-size: .48rem; letter-spacing: .2em;
  color: rgba(255,255,255,0.18);
}

/* Progress bar */
#progress {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: rgba(255,255,255,0.06);
  z-index: 3;
}
#progress-fill {
  height: 100%;
  background: var(--gold);
  width: 0%;
  transition: width linear;
  opacity: 0.5;
}

/* ── CONTROLS (appear on hover) ── */
#controls {
  position: absolute;
  top: 20px; right: 20px;
  z-index: 10;
  display: flex; gap: 8px;
  opacity: 0;
  transition: opacity .3s;
}
body:hover #controls { opacity: 1; }
body:hover { cursor: default; }

.ctrl-btn {
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.4);
  font-family: 'DM Mono', monospace;
  font-size: .52rem; letter-spacing: .12em;
  padding: 6px 12px; border-radius: 2px;
  cursor: pointer; text-transform: uppercase;
  transition: all .15s;
  backdrop-filter: blur(8px);
}
.ctrl-btn:hover { border-color: var(--gold); color: var(--gold); }

/* Grain overlay */
#grain {
  position: fixed; inset: 0; z-index: 20;
  pointer-events: none; opacity: 0.028;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* Loading state */
#loading {
  position: fixed; inset: 0; z-index: 50;
  display: none; align-items: center; justify-content: center;
  background: var(--ink);
}
#loading.show { display: flex; }
.load-ring {
  width: 28px; height: 28px;
  border: 1px solid rgba(255,255,255,0.08);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin .9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="grain"></div>

<!-- CONNECT -->
<div id="connect">
  <div class="c-wordmark">NFT Frame</div>
  <button class="c-btn" onclick="connectWallet()">Connect Phantom</button>
  <div class="c-note" id="no-ph" style="display:none">
    Phantom not found — <a href="https://phantom.app" target="_blank">install it</a>
  </div>
</div>

<!-- LOADING -->
<div id="loading"><div class="load-ring"></div></div>

<!-- FRAME -->
<div id="frame">
  <div id="bg"></div>
  <div id="art-wrap">
    <img id="art" src="" alt="" />
  </div>
  <div id="meta">
    <div class="meta-left">
      <div class="meta-name" id="m-name"></div>
      <div class="meta-coll" id="m-coll"></div>
      <div class="meta-traits" id="m-traits"></div>
    </div>
    <div class="meta-right">
      <a class="me-link" id="m-melink" href="#" target="_blank" rel="noopener">View on Magic Eden ↗</a>
      <div class="meta-counter" id="m-counter"></div>
    </div>
  </div>
  <div id="progress"><div id="progress-fill"></div></div>
  <div id="controls">
    <button class="ctrl-btn" id="pause-btn" onclick="togglePause()">Pause</button>
    <button class="ctrl-btn" onclick="prevNFT()">&#8592;</button>
    <button class="ctrl-btn" onclick="nextNFT()">&#8594;</button>
    <button class="ctrl-btn" onclick="disconnect()" style="opacity:.4">Disconnect</button>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────
// Paste your Helius API key here
var HELIUS_KEY    = '36ed4b8e-218e-4f34-a367-4d75185dea34';
var INTERVAL      = 3000;   // ms per NFT
var MAX_TRAITS    = 4;      // traits shown in overlay
// Set to a collection name keyword to filter (e.g. 'spawn'), or null for all NFTs
var FILTER        = 'spawn';

// ── STATE ───────────────────────────────────────────
var wallet  = null;
var nfts    = [];
var idx     = 0;
var paused  = false;
var timer   = null;
var progTimer = null;

// ── DOM ─────────────────────────────────────────────
var connectEl = document.getElementById('connect');
var frameEl   = document.getElementById('frame');
var loadingEl = document.getElementById('loading');
var bgEl      = document.getElementById('bg');
var artEl     = document.getElementById('art');
var mName     = document.getElementById('m-name');
var mColl     = document.getElementById('m-coll');
var mTraits   = document.getElementById('m-traits');
var mMeLink   = document.getElementById('m-melink');
var mCounter  = document.getElementById('m-counter');
var progFill  = document.getElementById('progress-fill');
var pauseBtn  = document.getElementById('pause-btn');

// ── WALLET ──────────────────────────────────────────
async function connectWallet() {
  var ph = window.solana;
  if (!ph || !ph.isPhantom) {
    document.getElementById('no-ph').style.display = 'block';
    return;
  }
  try {
    var r = await ph.connect();
    wallet = r.publicKey.toString();
    connectEl.classList.add('hide');
    loadingEl.classList.add('show');
    await loadNFTs();
  } catch(e) { console.error(e); }
}

function disconnect() {
  wallet = null; nfts = [];
  clearTimeout(timer);
  frameEl.classList.remove('show');
  connectEl.classList.remove('hide');
}

window.addEventListener('load', async function() {
  var ph = window.solana;
  if (ph && ph.isPhantom) {
    try {
      var r = await ph.connect({ onlyIfTrusted: true });
      wallet = r.publicKey.toString();
      connectEl.classList.add('hide');
      loadingEl.classList.add('show');
      await loadNFTs();
    } catch(e) {}
  }
});

// ── LOAD ─────────────────────────────────────────────
var RPC = 'https://mainnet.helius-rpc.com/?api-key=' + HELIUS_KEY;

async function rpc(method, params, usePost) {
  var body = usePost
    ? JSON.stringify({ jsonrpc:'2.0', id:1, method: method, params: params })
    : JSON.stringify({ jsonrpc:'2.0', id:1, method: method, params: params });
  var r = await fetch(RPC, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: body
  });
  var j = await r.json();
  return j.result;
}

async function loadNFTs() {
  try {
    // Use Helius getAssetsByOwner — single call, returns everything
    var page = 1; var all = [];
    while (true) {
      var result = await rpc('getAssetsByOwner', {
        ownerAddress: wallet, page: page, limit: 1000,
        displayOptions: { showUnverifiedCollections: true, showCollectionMetadata: true }
      });
      var items = (result && result.items) || [];
      for (var i = 0; i < items.length; i++) {
        var a = items[i];
        if (['V1_NFT','ProgrammableNFT','V1_PRINT','MplCoreAsset'].indexOf(a.interface) >= 0) {
          var n = parse(a);
          if (n.image) all.push(n); // only include if has image
        }
      }
      if (items.length < 1000 || ++page > 10) break;
    }

    // Filter by keyword if set
    nfts = FILTER
      ? all.filter(function(n) {
          return (n.name + ' ' + n.collection).toLowerCase().indexOf(FILTER.toLowerCase()) >= 0;
        })
      : all;

    // Shuffle for variety
    nfts = shuffle(nfts);

    loadingEl.classList.remove('show');

    if (!nfts.length) {
      connectEl.classList.remove('hide');
      document.querySelector('.c-wordmark').textContent = 'No NFTs found';
      return;
    }

    frameEl.classList.add('show');
    idx = 0;
    show(idx);
    schedule();
  } catch(e) {
    console.error(e);
    loadingEl.classList.remove('show');
    connectEl.classList.remove('hide');
  }
}

function parse(a) {
  var meta  = (a.content && a.content.metadata) || {};
  var links = (a.content && a.content.links) || {};
  var files = (a.content && a.content.files) || [];
  var grp   = (a.grouping || []).find(function(g){ return g.group_key === 'collection'; });
  var imgFile = files.find(function(f){ return f.mime && f.mime.startsWith('image/'); }) || files[0] || {};
  return {
    mint:       a.id,
    name:       meta.name || '',
    collection: (grp && grp.collection_metadata && grp.collection_metadata.name) || meta.symbol || '',
    image:      links.image || imgFile.cdn_uri || imgFile.uri || '',
    attributes: meta.attributes || [],
  };
}

function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return arr;
}

// ── DISPLAY ──────────────────────────────────────────
function show(i) {
  var n = nfts[i];
  if (!n) return;

  // Crossfade art
  artEl.classList.add('fade');
  setTimeout(function() {
    artEl.src = n.image;
    artEl.onload = function() { artEl.classList.remove('fade'); };
    artEl.onerror = function() { artEl.classList.remove('fade'); };
  }, 350);

  // Blurred bg
  bgEl.style.backgroundImage = 'url(' + n.image + ')';

  // Name + collection
  mName.textContent = n.name;
  mColl.textContent = n.collection;

  // Traits — show top N
  var attrs = (n.attributes || []).slice(0, MAX_TRAITS);
  mTraits.innerHTML = attrs.map(function(a) {
    return '<div class="trait">'
      + '<div class="trait-type">' + esc(String(a.trait_type || '')) + '</div>'
      + '<div class="trait-val">' + esc(String(a.value || '—')) + '</div>'
      + '</div>';
  }).join('');

  // Magic Eden link
  mMeLink.href = 'https://magiceden.io/item-details/' + n.mint;

  // Counter
  mCounter.textContent = (i + 1) + ' / ' + nfts.length;

  // Preload next
  if (nfts[i + 1]) { var pre = new Image(); pre.src = nfts[i + 1].image; }
}

function nextNFT() {
  idx = (idx + 1) % nfts.length;
  show(idx);
  if (!paused) { clearTimeout(timer); schedule(); }
}

function prevNFT() {
  idx = (idx - 1 + nfts.length) % nfts.length;
  show(idx);
  if (!paused) { clearTimeout(timer); schedule(); }
}

function schedule() {
  clearTimeout(timer);
  // Animate progress bar
  progFill.style.transition = 'none';
  progFill.style.width = '0%';
  void progFill.offsetWidth;
  progFill.style.transition = 'width ' + INTERVAL + 'ms linear';
  progFill.style.width = '100%';

  timer = setTimeout(function() {
    idx = (idx + 1) % nfts.length;
    show(idx);
    schedule();
  }, INTERVAL);
}

function togglePause() {
  paused = !paused;
  pauseBtn.textContent = paused ? 'Play' : 'Pause';
  if (paused) {
    clearTimeout(timer);
    progFill.style.transition = 'none'; // freeze bar
  } else {
    schedule();
  }
}

// Tap anywhere (not on controls/link) to pause/resume
document.getElementById('frame').addEventListener('click', function(e) {
  if (e.target.closest('#controls') || e.target.closest('.me-link')) return;
  togglePause();
});

// Arrow keys
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight') nextNFT();
  if (e.key === 'ArrowLeft')  prevNFT();
  if (e.key === ' ') { e.preventDefault(); togglePause(); }
});

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
