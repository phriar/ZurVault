<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZurVault — NFT Comic Reader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #07070a;
  --s1: #0e0e14;
  --s2: #14141c;
  --border: #222230;
  --gold: #c9a84c;
  --gold2: #e8c96a;
  --gold-dim: #c9a84c1a;
  --text: #e2e2ee;
  --muted: #55556e;
  --green: #27ae60;
  --ff-display: 'Bebas Neue', sans-serif;
  --ff-mono: 'DM Mono', monospace;
  --ff-cond: 'Barlow Condensed', sans-serif;
  --ff-body: 'Barlow', sans-serif;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--ff-body); overflow: hidden; }

/* ── TOP BAR ── */
#topbar {
position: fixed; top: 0; left: 0; right: 0; height: 54px;
background: #09090dee; backdrop-filter: blur(20px);
border-bottom: 1px solid var(–border);
display: flex; align-items: center; padding: 0 20px; gap: 16px; z-index: 300;
}

#wordmark {
display: flex; align-items: baseline; gap: 2px; flex-shrink: 0; text-decoration: none;
}
#wordmark-zur {
font-family: var(–ff-display); font-size: 1.55rem; letter-spacing: .04em;
color: var(–text); line-height: 1;
}
#wordmark-vault {
font-family: var(–ff-display); font-size: 1.55rem; letter-spacing: .04em;
color: var(–gold); line-height: 1;
}
#wordmark-tag {
font-family: var(–ff-mono); font-size: .5rem; color: var(–muted);
letter-spacing: .2em; margin-left: 8px; align-self: center;
border: 1px solid var(–border); padding: 2px 6px; border-radius: 3px;
}

.tsep { width: 1px; height: 24px; background: var(–border); flex-shrink: 0; }
#topbar-sub { flex: 1; font-family: var(–ff-mono); font-size: .62rem; color: var(–muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

#back-btn {
background: none; border: 1px solid var(–border); color: var(–muted);
padding: 5px 12px; border-radius: 4px; cursor: pointer;
font-family: var(–ff-cond); font-size: .8rem; font-weight: 600;
letter-spacing: .08em; text-transform: uppercase; transition: all .2s;
display: none; flex-shrink: 0;
}
#back-btn:hover { border-color: var(–gold); color: var(–gold); }
#back-btn.show { display: block; }

#wallet-pill {
display: flex; align-items: center; gap: 7px;
padding: 5px 14px; border-radius: 20px;
border: 1px solid var(–border); cursor: pointer;
font-family: var(–ff-mono); font-size: .62rem; color: var(–muted);
transition: all .2s; background: none; flex-shrink: 0;
}
#wallet-pill:hover { border-color: var(–gold); color: var(–gold); }
#wallet-pill.on { border-color: var(–green); color: var(–green); }
.wdot { width: 6px; height: 6px; border-radius: 50%; background: var(–muted); flex-shrink: 0; transition: all .3s; }
#wallet-pill.on .wdot { background: var(–green); box-shadow: 0 0 7px var(–green); }

/* ── APP ── */
#app { padding-top: 54px; height: 100vh; }
.view { position: absolute; inset: 54px 0 0; display: none; }
.view.active { display: flex; flex-direction: column; }

/* ─────────────────────────────────────────────
CONNECT VIEW
───────────────────────────────────────────── */
#view-connect {
align-items: center; justify-content: center; overflow: hidden;
background: var(–bg);
}
/* background glyph */
#view-connect::before {
content: ‘Z’;
position: absolute;
font-family: var(–ff-display);
font-size: 60vw; color: #c9a84c06;
top: 50%; left: 50%; transform: translate(-50%, -50%);
pointer-events: none; user-select: none; line-height: 1;
}

.connect-inner {
position: relative; text-align: center; max-width: 400px; padding: 24px;
}

.connect-logo-wrap {
margin: 0 auto 32px;
width: 90px; height: 90px;
border: 1px solid var(–border);
border-radius: 22px;
background: var(–s1);
display: flex; align-items: center; justify-content: center;
box-shadow: 0 0 60px #c9a84c14, inset 0 1px 0 #ffffff08;
}
.connect-logo-wrap svg { width: 52px; height: 52px; }

.connect-title {
font-family: var(–ff-display); font-size: 3rem; letter-spacing: .06em; line-height: 1;
margin-bottom: 6px;
}
.connect-title span { color: var(–gold); }

.connect-sub {
font-family: var(–ff-mono); font-size: .58rem; letter-spacing: .22em;
color: var(–muted); text-transform: uppercase; margin-bottom: 28px;
}

.connect-desc {
font-size: .85rem; color: var(–muted); line-height: 1.7; margin-bottom: 36px;
max-width: 320px; margin-left: auto; margin-right: auto;
}

#connect-btn {
display: inline-flex; align-items: center; gap: 10px;
padding: 13px 30px; border-radius: 8px;
background: #9945ff18; border: 1px solid #9945ff66;
color: #c077ff; cursor: pointer;
font-family: var(–ff-cond); font-size: 1.1rem; font-weight: 600; letter-spacing: .1em;
transition: all .25s;
}
#connect-btn:hover { background: #9945ff28; border-color: #9945ffaa; box-shadow: 0 0 28px #9945ff22; }
#connect-btn svg { width: 24px; height: 24px; flex-shrink: 0; }

#no-phantom {
margin-top: 14px; font-size: .72rem; color: var(–muted);
display: none;
}
#no-phantom a { color: var(–gold); text-decoration: none; }

.connect-features {
display: flex; gap: 24px; justify-content: center;
margin-top: 40px; flex-wrap: wrap;
}
.feature {
display: flex; flex-direction: column; align-items: center; gap: 6px;
font-size: .7rem; color: var(–muted); text-align: center; max-width: 90px;
}
.feature-icon {
width: 36px; height: 36px; border: 1px solid var(–border); border-radius: 8px;
background: var(–s1); display: flex; align-items: center; justify-content: center;
font-size: 1.1rem;
}

/* ─────────────────────────────────────────────
COLLECTION VIEW
───────────────────────────────────────────── */
